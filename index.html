<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Humanizer Web App</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            max-width: 600px; 
            margin: auto; 
            background-color: #f4f7f6; 
        }
        h1 { 
            color: #333; 
            text-align: center; 
        }
        textarea { 
            width: 100%; 
            height: 120px; 
            margin-bottom: 15px; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
            font-size: 16px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
        }
        button:hover { 
            background-color: #0056b3; 
        }
        #result { 
            margin-top: 20px; 
            padding: 15px; 
            background-color: #fff; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            min-height: 80px; 
            font-size: 16px; 
            white-space: pre-wrap; 
            line-height: 1.5; 
        }
    </style>
</head>
<body>

    <h1>My Free AI Humanizer</h1>
    <p style="text-align: center;">රොබෝ කෙනෙක් වගේ ලියපු දේවල් මනුස්සයෙක් ලියන විදියට වෙනස් කරමු!</p>
    
    <textarea id="inputText" placeholder="මෙතන ටයිප් කරන්න (හරි Paste කරන්න)..."></textarea>
    <button onclick="humanizeText()">Humanize Text</button>

    <div id="result">ප්‍රතිඵලය මෙතන පෙන්වයි...</div>

    <script>
        async function humanizeText() {
            const text = document.getElementById("inputText").value;
            const resultDiv = document.getElementById("result");

            if (!text) {
                alert("කරුණාකර යමක් ටයිප් කරන්න!");
                return;
            }

            resultDiv.innerHTML = "කරුණාකර රැඳී සිටින්න... ⏳";

            try {
                const response = await fetch('/api/humanize', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                
                if(data.result) {
                    resultDiv.innerHTML = data.result;
                } else if (data.error) {
                    // ඇත්තම Error එක මෙතන පෙන්වයි
                    resultDiv.innerHTML = "❌ දෝෂයක්: " + data.error;
                } else {
                    resultDiv.innerHTML = "සමාවෙන්න, දෝෂයක් ඇතිවිය! ❌";
                }
            } catch (error) {
                resultDiv.innerHTML = "අන්තර්ජාල සම්බන්ධතාවය හෝ API එකේ දෝෂයක්! ❌";
                console.error(error);
            }
        }
    </script>

</body>
</html>
