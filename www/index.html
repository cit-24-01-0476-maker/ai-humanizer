<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ezyhumernzi.AI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0099ff, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: white;
    }

    .circle1 {
      position: fixed;
      top: -120px;
      right: -120px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
    }

    .circle2 {
      position: fixed;
      bottom: -120px;
      left: -100px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.12);
    }

    .card {
      position: relative;
      z-index: 2;
      width: 88%;
      max-width: 420px;
      padding: 38px 26px;
      border-radius: 30px;
      text-align: center;
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 25px 65px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .logo {
      width: 95px;
      height: 95px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: white;
      color: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.25);
    }

    p {
      margin: 14px auto 28px;
      max-width: 310px;
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.95;
    }

    .btn {
      width: 100%;
      display: block;
      text-decoration: none;
      background: black;
      color: white;
      padding: 17px 24px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.35);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .note {
      margin-top: 18px;
      font-size: 0.78rem;
      opacity: 0.85;
    }

    .footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      text-align: center;
      font-size: 0.75rem;
      opacity: 0.85;
      z-index: 2;
    }
  </style>
</head>

<body>
  <div class="circle1"></div>
  <div class="circle2"></div>

  <div class="card">
    <div class="logo">✨</div>

    <h1>ezyhumernzi.AI</h1>

    <p>
      Make your AI-written text sound natural, simple, and human.
    </p>

    <a class="btn" href="https://ezyhumernzi.ai.oskaa.tech/" target="_blank">
      Access Now ✦
    </a>

    <div class="note">
      Tap Access Now to open the official website.
    </div>
  </div>

  <div class="footer">
    Powered by oska.tech
  </div>
</body>
</html>
