<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ezyhumernzi.AI</title>

    <link rel="icon" type="image/gif" href="logo.gif">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background-image: url("bg.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(2px);
        }

        .app-card {
            position: relative;
            z-index: 2;
            width: 88%;
            max-width: 420px;
            padding: 35px 25px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(18px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.25);
            animation: popIn 0.7s ease forwards;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .logo {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            background: white;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.4px;
        }

        .tagline {
            margin: 12px auto 25px;
            font-size: 0.98rem;
            line-height: 1.6;
            opacity: 0.92;
            max-width: 320px;
        }

        .access-btn {
            width: 100%;
            border: none;
            outline: none;
            background: #000;
            color: #fff;
            padding: 17px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
            transition: transform 0.15s, opacity 0.15s;
        }

        .access-btn:active {
            transform: scale(0.96);
            opacity: 0.85;
        }

        .small-text {
            margin-top: 18px;
            font-size: 0.78rem;
            opacity: 0.8;
        }

        .loader {
            display: none;
            margin: 18px auto 0;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer {
            position: fixed;
            bottom: 16px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
            font-size: 0.75rem;
            opacity: 0.85;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <div class="app-card">
        <img src="logo.gif" alt="ezyhumernzi.AI Logo" class="logo">

        <h1>ezyhumernzi.AI</h1>

        <p class="tagline">
            Make your AI-written text sound natural, simple, and human.
        </p>

        <button class="access-btn" onclick="openWebsite()">
            Access Now ✦
        </button>

        <div id="loader" class="loader"></div>

        <p class="small-text">
            Tap Access Now to open the official website.
        </p>
    </div>

    <div class="footer">
        Powered by oska.tech
    </div>

    <script>
        const WEBSITE_URL = "https://ezyhumernzi.ai.oskaa.tech/";

        async function openWebsite() {
            const loader = document.getElementById("loader");
            loader.style.display = "block";

            try {
                if (
                    window.Capacitor &&
                    window.Capacitor.Plugins &&
                    window.Capacitor.Plugins.Browser
                ) {
                    await window.Capacitor.Plugins.Browser.open({
                        url: WEBSITE_URL
                    });
                    loader.style.display = "none";
                    return;
                }

                window.open(WEBSITE_URL, "_system");
                loader.style.display = "none";

            } catch (error) {
                loader.style.display = "none";
                window.location.href = WEBSITE_URL;
            }
        }
    </script>
</body>
</html>
